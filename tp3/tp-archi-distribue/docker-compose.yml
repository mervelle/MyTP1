version: '3.8'

services:
  # Base de données MongoDB 
  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  # Cache Redis 
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - '6379:6379'

  # Bus de messages RabbitMQ 
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - '5672:5672'      # AMQP
      - '15672:15672'    # Interface web d'admin
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin

  # Serveur applicatif instance 1
  app1:
    build: app
    container_name: app1
    environment:
      PORT: 3001
      INSTANCE: 'Instance-1'
    volumes:
      - ./app:/app
      - /app/node_modules # <--- Ajoute cette ligne (volume anonyme)
    ports:
      - '3001:3001'
    depends_on:
      - mongodb
      - redis
      - rabbitmq

  # Serveur applicatif instance 2
  app2:
    build: app
    container_name: app2  # Ajoute-le pour la clarté
    depends_on:
      - rabbitmq
      - mongodb
    restart: on-failure
    environment:
      - PORT=3002
      - INSTANCE=Consumer-1
    ports:
      - '3002:3002'
    volumes:
      - ./app:/app
      - /app/node_modules
   

  # Load Balancer Nginx 
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2

volumes:
  mongo_data: